<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(420px, calc(100vw - 24px));
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f6ad55;
      letter-spacing: 1px;
    }

    .back-link {
      color: #a0aec0;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #f6ad55; }

    /* ── Scoreboard ── */
    .scoreboard {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      width: min(420px, calc(100vw - 24px));
    }

    .player-score {
      flex: 1;
      background: #161b22;
      border: 2px solid #21262d;
      border-radius: 14px;
      padding: 12px 16px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .player-score.active-x { border-color: #63b3ed; box-shadow: 0 0 18px rgba(99,179,237,0.2); }
    .player-score.active-o { border-color: #fc8181; box-shadow: 0 0 18px rgba(252,129,129,0.2); }

    .player-score .pname {
      font-size: 13px;
      color: #718096;
      margin-bottom: 2px;
    }

    .player-score .psymbol {
      font-size: 26px;
      font-weight: 800;
    }

    .player-score.x-side .psymbol { color: #63b3ed; }
    .player-score.o-side .psymbol { color: #fc8181; }

    .player-score .ppts {
      font-size: 22px;
      font-weight: 700;
      color: #e2e8f0;
    }

    .draw-score {
      background: #161b22;
      border: 2px solid #21262d;
      border-radius: 14px;
      padding: 12px 16px;
      text-align: center;
      min-width: 80px;
    }
    .draw-score .pname { font-size: 13px; color: #718096; margin-bottom: 2px; }
    .draw-score .ppts  { font-size: 22px; font-weight: 700; color: #a0aec0; }

    /* ── Board ── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: min(420px, calc(100vw - 24px));
      margin-bottom: 20px;
    }

    .cell {
      background: #161b22;
      border: 2px solid #21262d;
      border-radius: 16px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(28px, 12vw, 60px);
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.2s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1e2633;
      border-color: #4a5568;
      transform: scale(1.03);
    }

    .cell.taken { cursor: default; }
    .cell.x { color: #63b3ed; }
    .cell.o { color: #fc8181; }

    .cell.winning {
      background: #1a2a1a;
      border-color: #68d391;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 8px rgba(104,211,145,0.3); }
      to   { box-shadow: 0 0 22px rgba(104,211,145,0.7); }
    }

    /* ── Turn label ── */
    #turnLabel {
      font-size: 16px;
      color: #a0aec0;
      margin-bottom: 16px;
      height: 22px;
      text-align: center;
    }

    /* ── Buttons ── */
    .controls { display: flex; gap: 12px; }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
    }

    button:active { transform: scale(0.95); }

    #btnNew  { background: #c05621; color: #fff; }
    #btnNew:hover  { background: #dd6b20; }
    #btnReset { background: #2d3748; color: #a0aec0; }
    #btnReset:hover { background: #4a5568; }

    /* ── Pass-screen overlay ── */
    #passScreen {
      position: fixed;
      inset: 0;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      animation: fadeIn 0.25s ease;
    }

    #passScreen.hidden { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    #passScreen .pass-icon { font-size: 64px; }

    #passScreen .pass-title {
      font-size: 28px;
      font-weight: 800;
    }

    #passScreen .pass-title.x { color: #63b3ed; }
    #passScreen .pass-title.o { color: #fc8181; }

    #passScreen .pass-sub {
      font-size: 16px;
      color: #718096;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
    }

    #btnReady {
      padding: 14px 48px;
      border: none;
      border-radius: 30px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
      margin-top: 8px;
    }

    #btnReady.x { background: #2b6cb0; color: #fff; }
    #btnReady.o { background: #c53030; color: #fff; }
    #btnReady:active { transform: scale(0.96); }
  </style>
</head>
<body>

  <!-- Pass-and-play screen -->
  <div id="passScreen">
    <div class="pass-icon" id="passIcon">🎮</div>
    <div class="pass-title" id="passTitle">Player X</div>
    <div class="pass-sub" id="passSub">Hand the device to Player X.<br>Press Ready when you're set!</div>
    <button id="btnReady" class="x">I'm Ready!</button>
  </div>

  <header>
    <h1>✕ Tic Tac Toe ○</h1>
    <a class="back-link" href="index.html">← Back to Portal</a>
  </header>

  <div class="scoreboard">
    <div class="player-score x-side active-x" id="scoreX">
      <div class="pname">Player X</div>
      <div class="psymbol">✕</div>
      <div class="ppts" id="winsX">0</div>
    </div>
    <div class="draw-score">
      <div class="pname">Draws</div>
      <div class="ppts" id="draws">0</div>
    </div>
    <div class="player-score o-side" id="scoreO">
      <div class="pname">Player O</div>
      <div class="psymbol">○</div>
      <div class="ppts" id="winsO">0</div>
    </div>
  </div>

  <div id="turnLabel">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div class="controls">
    <button id="btnNew">New Round</button>
    <button id="btnReset">Reset Score</button>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const cells = document.querySelectorAll('.cell');

    let board, current, gameOver, winsX, winsO, drawCount;
    let awaitingPass = false;

    winsX = 0; winsO = 0; drawCount = 0;

    // ── Pass screen helpers ──────────────────────────────────────────────────

    const passScreen  = document.getElementById('passScreen');
    const passIcon    = document.getElementById('passIcon');
    const passTitle   = document.getElementById('passTitle');
    const passSub     = document.getElementById('passSub');
    const btnReady    = document.getElementById('btnReady');

    function showPassScreen(player, message) {
      passIcon.textContent  = player === 'X' ? '✕' : '○';
      passTitle.textContent = `Player ${player}'s Turn`;
      passTitle.className   = `pass-title ${player.toLowerCase()}`;
      passSub.innerHTML     = message || `Hand the device to Player ${player}.<br>Press Ready when you're set!`;
      btnReady.className    = player === 'X' ? 'x' : 'o';
      passScreen.classList.remove('hidden');
      awaitingPass = true;
    }

    function hidePassScreen() {
      passScreen.classList.add('hidden');
      awaitingPass = false;
    }

    btnReady.addEventListener('click', hidePassScreen);

    // ── Game logic ───────────────────────────────────────────────────────────

    function initGame() {
      board    = Array(9).fill(null);
      current  = 'X';
      gameOver = false;

      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });

      updateTurnLabel();
      highlightActive();
    }

    function updateTurnLabel() {
      const lbl = document.getElementById('turnLabel');
      if (gameOver) { lbl.textContent = ''; return; }
      lbl.innerHTML = current === 'X'
        ? `<span style="color:#63b3ed">Player X</span>'s turn`
        : `<span style="color:#fc8181">Player O</span>'s turn`;
    }

    function highlightActive() {
      document.getElementById('scoreX').className =
        `player-score x-side${current === 'X' && !gameOver ? ' active-x' : ''}`;
      document.getElementById('scoreO').className =
        `player-score o-side${current === 'O' && !gameOver ? ' active-o' : ''}`;
    }

    function checkWinner() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a,b,c] };
        }
      }
      if (board.every(v => v)) return { winner: null, line: [] }; // draw
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        if (gameOver || awaitingPass) return;
        const i = parseInt(cell.dataset.i);
        if (board[i]) return;

        board[i] = current;
        cell.textContent = current === 'X' ? '✕' : '○';
        cell.classList.add('taken', current.toLowerCase());

        const result = checkWinner();

        if (result) {
          gameOver = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('winning'));
            if (result.winner === 'X') {
              winsX++;
              document.getElementById('winsX').textContent = winsX;
            } else {
              winsO++;
              document.getElementById('winsO').textContent = winsO;
            }
            document.getElementById('turnLabel').innerHTML =
              `<span style="color:${result.winner==='X'?'#63b3ed':'#fc8181'}">Player ${result.winner}</span> wins! 🎉`;
            highlightActive();
          } else {
            drawCount++;
            document.getElementById('draws').textContent = drawCount;
            document.getElementById('turnLabel').textContent = "It's a draw! 🤝";
            highlightActive();
          }
          return;
        }

        // Switch player and show pass screen
        current = current === 'X' ? 'O' : 'X';
        updateTurnLabel();
        highlightActive();

        showPassScreen(current);
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === ' ') { e.preventDefault(); document.getElementById('btnNew').click(); }
    });

    document.getElementById('btnNew').addEventListener('click', () => {
      initGame();
      // Show pass screen for X to start
      showPassScreen('X', `New round! Hand the device to Player X.<br>Press Ready when you're set!`);
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      winsX = 0; winsO = 0; drawCount = 0;
      document.getElementById('winsX').textContent = 0;
      document.getElementById('winsO').textContent = 0;
      document.getElementById('draws').textContent = 0;
      initGame();
      showPassScreen('X', `Scores reset! Hand the device to Player X.<br>Press Ready when you're set!`);
    });

    // ── Boot ─────────────────────────────────────────────────────────────────
    initGame();
    showPassScreen('X', `Welcome! Hand the device to Player X.<br>Press Ready when you're set!`);
  </script>
</body>
</html>
